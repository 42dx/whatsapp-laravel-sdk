name: On PR Open/Update

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - beta
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
    branches:
      - main
      - beta

jobs:
  pr-checks:
    name: Code Quality & Reliability Checks
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
      issues: write
    env:
      PHP-VERSION: 8.4
      PHP-EXTENSIONS: mbstring, xdebug
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean Up SonarQube Comments
        if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.draft }}
        uses: izhangzhihao/delete-comment@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_user_name: sonarcloud[bot]
          issue_number: ${{ github.event.number }}

      - name: Validate Commit Messages
        if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.draft }}
        run: ./tools/scripts/validate-commit-msgs.sh

      - name: Setup PHP Environment
        uses: ./.github/actions/php-setup
        with:
          PHP-VERSION: ${{ env.PHP-VERSION }}
          PHP-EXTENSIONS: ${{ env.PHP-EXTENSIONS }}

      - name: Linting
        run: composer lint

      - name: Unit Test
        run: composer coverage

      - name: PR SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: |-
            -Dsonar.qualitygate.wait=true
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.key=${{ github.event.number }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}
